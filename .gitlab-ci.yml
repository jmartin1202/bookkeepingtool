image: node:22-alpine

stages:
  - verify
  - build

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/

before_script:
  - node --version
  - npm --version
  - if [ -f package-lock.json ]; then npm ci --cache .npm --prefer-offline; else npm install --cache .npm --prefer-offline; fi

typecheck:
  stage: verify
  script:
    - npm run typecheck

build:
  stage: build
  script:
    - npm run build
